name: Full CI/CD (Frontend + Backend)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install backend deps (root)
      - name: Install backend dependencies
        run: npm install

      # 4. Install frontend deps
      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      # 5. Build frontend
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      # 6. Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: us-east-1

      # 7. Deploy frontend to S3
      - name: Upload to S3
        run: |
          aws s3 sync ./frontend/build s3://${{ secrets.S3_BUCKET_NAME }} --delete

      # 8. Install Serverless
      - name: Install Serverless
        run: npm install -g serverless

      # 9. Deploy backend (Lambda)
      - name: Deploy Lambda
        run: serverless deploy
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      # 10. Invalidate CloudFront
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
